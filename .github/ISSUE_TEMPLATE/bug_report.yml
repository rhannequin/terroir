name: Bug report
description: Something on the site does not work as expected.
title: '[bug] '
labels: ['bug']
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the problem.
      placeholder: When I clicked on a marker, the popup was empty.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps so we can reproduce the issue locally.
      placeholder: |
        1. Go to https://rhannequin.github.io/terroir/
        2. Click on the marker for ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      placeholder: I expected the popup to show the AOP details.
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      placeholder: The popup was empty.
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser and OS
      placeholder: Firefox 134 on macOS 15
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots or recording
      description: Drag-and-drop images here if useful.

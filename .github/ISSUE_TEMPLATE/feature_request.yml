name: Feature request
description: Suggest a new capability or improvement.
title: '[feature] '
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve?
      placeholder: It is hard to find dishes that pair with a given AOP wine.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      placeholder: Add a "pairs with" link from each wine AOP to one or more dishes.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one is better.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Mockups, references, related issues.
